<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica Canvas - 7 Figuras</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            margin-top: 20px; 
            background-color: #f4f4f9;
        }
        canvas { 
            border: 2px solid #333; 
            margin-top: 20px; 
            background-color: #fff;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1); 
        }
        .botones { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            flex-wrap: wrap; 
            margin-bottom: 20px; 
        }
        button { 
            padding: 10px 15px; 
            cursor: pointer; 
            border: 1px solid #0056b3; 
            background-color: #e9ecef; 
            border-radius: 5px; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { 
            background-color: #0056b3; 
            color: white; 
        }
    </style>
</head>
<body>
    <h1>Dibujando formas con Canvas</h1>
    
    <div class="botones">
        <button id="btnRectangulo">Rectángulo</button>
        <button id="btnTriangulo">Triángulo</button>
        <button id="btnHappyFace">Happy Face</button>
        <button id="btnLineas">Líneas</button>
        <button id="btnArcos">Arcos</button>
        <button id="btnCurvas">Curvas</button>
        <button id="btnCombinaciones">Combinaciones</button>
    </div>

    <canvas id="miCanvas" width="400" height="400"></canvas>

    <script src="main.js"></script>
</body>
</html>
